events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 80;
        server_name test.hexalyte.com api.test.hexalyte.com admin2.hexalyte.com app.hexalyte.com api.shop.hexalyte.com shop.hexalyte.com shop.clothing.api.hexalyte.com admin3.hexalyte.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name test.hexalyte.com;
        ssl_certificate /etc/letsencrypt/live/test.hexalyte.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/test.hexalyte.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        location / {
            set $upstream http://frontend-app:3000;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name admin2.hexalyte.com;
        ssl_certificate /etc/letsencrypt/live/admin2.hexalyte.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/admin2.hexalyte.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        location / {
            set $upstream http://hexalyte_admin:3002;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name app.hexalyte.com;
        ssl_certificate /etc/letsencrypt/live/app.hexalyte.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/app.hexalyte.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        location / {
            set $upstream http://hexalyte_web:3000;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name api.shop.hexalyte.com;
        ssl_certificate /etc/letsencrypt/live/api.shop.hexalyte.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.shop.hexalyte.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        client_max_body_size 100M;
        location / {
            set $upstream http://hexalyte_backend:3001;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection upgrade;
        }
    }

    server {
        listen 443 ssl;
        server_name api.test.hexalyte.com;
        ssl_certificate /etc/letsencrypt/live/test.hexalyte.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/test.hexalyte.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        client_max_body_size 100M;
        location / {
            set $upstream http://backend-app:4444;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection upgrade;
        }
    }

    server {
        listen 80;
        server_name ~^(?<tenant>[^.]+)\.app\.hexalyte\.com$;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name ~^(?<tenant>[^.]+)\.app\.hexalyte\.com$;
        ssl_certificate /etc/letsencrypt/live/app.hexalyte.com-0001/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/app.hexalyte.com-0001/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        location / {
            set $upstream http://hexalyte_web:3000;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection upgrade;
        }
    }

    # ── FashionERP Frontend: shop.hexalyte.com ───────────────────
    server {
        listen 443 ssl;
        server_name shop.hexalyte.com;
        ssl_certificate /etc/letsencrypt/live/shop.hexalyte.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/shop.hexalyte.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        client_max_body_size 50M;
        location / {
            set $upstream http://fashionerp_web:3000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # ── FashionERP API: shop.clothing.api.hexalyte.com ───────────
    server {
        listen 443 ssl;
        server_name shop.clothing.api.hexalyte.com;
        ssl_certificate /etc/letsencrypt/live/shop.clothing.api.hexalyte.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/shop.clothing.api.hexalyte.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        client_max_body_size 50M;
        location / {
            set $upstream http://fashionerp_api:3001;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # ── FashionERP Admin: admin3.hexalyte.com ────────────────────
    server {
        listen 443 ssl;
        server_name admin3.hexalyte.com;
        ssl_certificate /etc/letsencrypt/live/admin3.hexalyte.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/admin3.hexalyte.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        location / {
            set $upstream http://fashionerp_web:3000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    server {
        listen 80 default_server;
        listen 443 ssl default_server;
        server_name _;
        ssl_certificate /etc/letsencrypt/live/test.hexalyte.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/test.hexalyte.com/privkey.pem;
        return 444;
    }
}
