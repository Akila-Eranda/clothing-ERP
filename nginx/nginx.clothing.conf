user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_status 429;

    # HTTP — certbot + redirect
    server {
        listen 80;
        server_name shop.hexalyte.com shop.clothing.api.hexalyte.com admin3.hexalyte.com *.shop.hexalyte.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Frontend: shop.hexalyte.com ───────────────────────────────
    server {
        listen 443 ssl;
        server_name shop.hexalyte.com;

        ssl_certificate     /etc/nginx/ssl/shop.hexalyte.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/shop.hexalyte.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        client_max_body_size 50M;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000" always;

        location / {
            set $web fashionerp_web;
            proxy_pass http://$web:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ── API: shop.clothing.api.hexalyte.com ───────────────────────
    server {
        listen 443 ssl;
        server_name shop.clothing.api.hexalyte.com;

        ssl_certificate     /etc/nginx/ssl/shop.clothing.api.hexalyte.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/shop.clothing.api.hexalyte.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        client_max_body_size 50M;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000" always;

        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            set $api fashionerp_api;
            proxy_pass http://$api:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/ {
            limit_req zone=api burst=80 nodelay;
            set $api fashionerp_api;
            proxy_pass http://$api:3001;
            proxy_http_version 1.1;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 300s;
        }

        location /ws {
            set $api fashionerp_api;
            proxy_pass http://$api:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
        }

        location /uploads/ {
            alias /var/www/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /health {
            set $api fashionerp_api;
            proxy_pass http://$api:3001/api/health;
            access_log off;
        }
    }

    # ── Admin Panel: admin3.hexalyte.com ────────────────────────────
    server {
        listen 443 ssl;
        server_name admin3.hexalyte.com;

        ssl_certificate     /etc/nginx/ssl/admin3.hexalyte.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/admin3.hexalyte.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        client_max_body_size 10M;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000" always;

        location /admin {
            set $web fashionerp_web;
            proxy_pass http://$web:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_cache_bypass $http_upgrade;
        }

        location /_next/ {
            set $web fashionerp_web;
            proxy_pass http://$web:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }

        location ~ ^/(favicon\.ico|logo\.png|robots\.txt) {
            set $web fashionerp_web;
            proxy_pass http://$web:3000;
        }

        location / {
            return 302 /admin;
        }
    }

    # ── Tenant shops: *.shop.hexalyte.com ─────────────────────────
    server {
        listen 443 ssl;
        server_name ~^(?<tenant>.+)\.shop\.hexalyte\.com$;

        ssl_certificate     /etc/nginx/ssl/wildcard.shop.hexalyte.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/wildcard.shop.hexalyte.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        client_max_body_size 10M;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000" always;

        location / {
            set $web fashionerp_web;
            proxy_pass http://$web:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Tenant-Slug $tenant;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
