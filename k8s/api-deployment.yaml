apiVersion: apps/v1
kind: Deployment
metadata:
  name: fashionerp-api
  namespace: fashionerp
  labels:
    app: fashionerp-api
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fashionerp-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: fashionerp-api
    spec:
      containers:
        - name: api
          image: ghcr.io/yourorg/fashionerp-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: fashionerp-secrets
            - configMapRef:
                name: fashionerp-config
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: fashionerp-uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: fashionerp-api-svc
  namespace: fashionerp
spec:
  selector:
    app: fashionerp-api
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fashionerp-api-hpa
  namespace: fashionerp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fashionerp-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
