version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fashionerp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fashionerp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fashionerp_secret}
      POSTGRES_DB: ${POSTGRES_DB:-fashionerp}
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-fashionerp}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fashionerp_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --maxmemory 256mb --maxmemory-policy noeviction
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '${REDIS_PASSWORD:-redis_secret}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: fashionerp_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fashionerp}:${POSTGRES_PASSWORD:-fashionerp_secret}@postgres:5432/${POSTGRES_DB:-fashionerp}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      NODE_ENV: production
      PORT: 3001
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://shop.hexalyte.com,https://admin3.hexalyte.com}
      FRONTEND_URL: ${FRONTEND_URL:-https://shop.hexalyte.com}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-60m}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-https://auth.hexalyte.com}
      KC_REALM: ${KC_REALM:-fashion-erp}
      KC_CLIENT_ID: ${KC_CLIENT_ID:-fashion-erp-api}
      KC_CLIENT_SECRET: ${KC_CLIENT_SECRET:-}
      PLATFORM_TENANT_SUBDOMAIN: ${PLATFORM_TENANT_SUBDOMAIN:-platform}
    ports:
      - '3001:3001'
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ['CMD-SHELL', 'node -e "require(\"http\").get(\"http://localhost:3001/api/v1/health\",r=>process.exit(r.statusCode===200?0:1)).on(\"error\",()=>process.exit(1))"']
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://shop.clothing.api.hexalyte.com/api/v1
        NEXT_PUBLIC_ADMIN_HOSTS: admin3.hexalyte.com
        NEXT_PUBLIC_PLATFORM_TENANT: platform
    container_name: fashionerp_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: https://shop.clothing.api.hexalyte.com/api/v1
      NEXT_PUBLIC_ADMIN_HOSTS: admin3.hexalyte.com
      NEXT_PUBLIC_PLATFORM_TENANT: platform
      NODE_ENV: production
    ports:
      - '3000:3000'

  nginx:
    image: nginx:alpine
    container_name: fashionerp_nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - uploads_data:/var/www/uploads:ro

volumes:
  postgres_data:
  redis_data:
  uploads_data:
